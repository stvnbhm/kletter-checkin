services:

  app:
    build: .                          # Image lokal bauen
    image: kletter-checkin
    container_name: kletter-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy    # Warten bis MySQL wirklich bereit ist
    networks:
      - kletternet
    environment:
      - TZ=Europe/Vienna
    # Kein Volume-Mount! vendor/ würde sonst überschrieben werden.

  nginx:
    image: nginx:alpine
    container_name: kletter-nginx
    restart: unless-stopped
    ports:
      - "80:80"                       # Port 80 statt 8080
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf  # Nginx-Config einbinden
    depends_on:
      - app
    networks:
      - kletternet

  db:
    image: mysql:8.0
    container_name: kletter-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: klettercheckin
      MYSQL_USER: checkinuser
      MYSQL_PASSWORD: ${DB_PASSWORD}       # aus .env – nicht hardcoded!
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - kletternet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - .:/var/www
    profiles: ["build"]

volumes:
  dbdata:

networks:
  kletternet:
    driver: bridge